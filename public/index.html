<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paywall Remote — Dev Preview</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 24px;
        background: #f3f4f6;
        margin: 0;
      }
      h1 {
        font-size: 18px;
        color: #374151;
        margin: 0 0 16px;
      }
      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        color: #fff;
        transition: opacity 0.2s;
      }
      button:hover {
        opacity: 0.85;
      }
      .btn-a { background: #4F46E5; }
      .btn-b { background: #16A34A; }
      .btn-c { background: #DC2626; }
      #status {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 8px;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Paywall Remote — Dev Preview</h1>
    <div class="controls">
      <button class="btn-a" data-variant="A">Paywall A (Blue)</button>
      <button class="btn-b" data-variant="B">Paywall B (Green)</button>
      <button class="btn-c" data-variant="C">Paywall C (Red)</button>
    </div>
    <p id="status">Select a variant to preview</p>
    <div id="paywall-root"></div>
  </body>
</html>
